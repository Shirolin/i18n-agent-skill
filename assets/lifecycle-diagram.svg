<svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', monospace; }
      .label { font-weight: 700; fill: white; font-size: 13px; }
      .cmd { fill: #94a3b8; font-size: 9px; font-weight: 400; }
      .level { font-weight: 800; font-size: 10px; }
      .l1 { fill: #fbbf24; }
      .l2 { fill: #22d3ee; }
      .l3 { fill: #fb7185; }
      .phase-title { fill: white; font-size: 11px; font-weight: 700; }
      .sublabel { fill: #475569; font-size: 8px; }
      .legend-text { fill: #94a3b8; font-size: 9px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617" />
  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Phase 1: Persona (The Foundation) -->
  <rect x="380" y="30" width="240" height="70" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="500" y="55" class="phase-title" text-anchor="middle">Phase 1: Persona Handshake</text>
  <text x="500" y="72" class="cmd" text-anchor="middle">/i18n-init & /i18n-save-persona</text>
  <text x="500" y="85" class="sublabel" text-anchor="middle">(Global Tone & Standards)</text>

  <!-- Vertical Connection -->
  <line x1="500" y1="100" x2="500" y2="140" stroke="#1e293b" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Phase 2: Discovery (L1) -->
  <rect x="100" y="160" width="180" height="90" rx="6" fill="rgba(15, 23, 42, 0.5)" stroke="#64748b" stroke-width="1.5"/>
  <text x="190" y="190" class="label" text-anchor="middle">Discovery</text>
  <text x="190" y="210" class="cmd" text-anchor="middle">[/i18n-scan] [/i18n-audit]</text>
  <text x="190" y="235" class="level l1" text-anchor="middle">L1 DRAFT</text>

  <!-- Phase 3: Promotion (L2) -->
  <rect x="410" y="160" width="180" height="90" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="190" class="label" text-anchor="middle">Promotion</text>
  <text x="500" y="210" class="cmd" text-anchor="middle">/i18n-optimize -> Commit</text>
  <text x="500" y="235" class="level l2" text-anchor="middle">L2 APPROVED</text>

  <!-- Phase 4: Projection -->
  <rect x="720" y="160" width="180" height="90" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="190" class="label" text-anchor="middle">Projection</text>
  <text x="810" y="210" class="cmd" text-anchor="middle">/i18n-pivot-sync</text>
  <text x="810" y="235" style="fill: white; font-size: 9px;" text-anchor="middle">Global Alignment</text>

  <!-- Phase 5: Mastery (L3) -->
  <rect x="410" y="340" width="180" height="90" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="500" y="370" class="label" text-anchor="middle">Mastery</text>
  <text x="500" y="390" class="cmd" text-anchor="middle">Manual Edits -> /i18n-learn</text>
  <text x="500" y="415" class="level l3" text-anchor="middle">L3 APPROVED</text>

  <!-- Main Flow Arrows -->
  <line x1="280" y1="205" x2="408" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="590" y1="205" x2="718" y2="205" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- L3 Projection Arrow -->
  <path d="M 590 385 Q 810 385 810 252" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="750" y="375" class="l3" style="font-size: 8px;">L3 Feed-Forward</text>

  <!-- Vertical Bridge -->
  <line x1="500" y1="250" x2="500" y2="338" stroke="#1e293b" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="510" y="300" class="sublabel">Authority Bridge</text>

  <!-- Legend -->
  <g transform="translate(100, 480)">
    <text x="0" y="0" style="fill: white; font-size: 10px; font-weight: 700;">Weight Hierarchy</text>
    <rect x="0" y="15" width="10" height="10" fill="#fbbf24"/> <text x="15" y="24" class="legend-text">L1 Draft (Fluid)</text>
    <rect x="180" y="15" width="10" height="10" fill="#22d3ee"/> <text x="195" y="24" class="legend-text">L2 Policy (AI+Commit)</text>
    <rect x="380" y="15" width="10" height="10" fill="#fb7185"/> <text x="395" y="24" class="legend-text">L3 Truth (Manual)</text>
  </g>

  <!-- Specs Badge -->
  <rect x="850" y="30" width="120" height="20" rx="4" fill="#fb7185"/>
  <text x="910" y="43" style="fill: white; font-size: 8px; font-weight: 800;" text-anchor="middle">SPEC v4.0 COMPLIANT</text>
</svg>
