<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <style>
      text { font-family: 'JetBrains Mono', monospace; }
      .label { font-weight: 600; fill: white; font-size: 13px; }
      .cmd { fill: #22d3ee; font-size: 10px; font-weight: 400; }
      .cmd-audit { fill: #34d399; }
      .cmd-sync { fill: #fb923c; }
      .cmd-apply { fill: #a78bfa; }
      .cmd-quality { fill: #fb7185; }
      .sublabel { fill: #94a3b8; font-size: 8px; }
      .legend-title { fill: white; font-weight: 600; font-size: 10px; }
      .tag { fill: #fb7185; font-size: 8px; font-weight: 600; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#020617" />
  <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Discovery Phase -->
  <rect x="50" y="150" width="160" height="70" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="130" y="178" class="label" text-anchor="middle">Extraction</text>
  <text x="130" y="200" class="cmd" text-anchor="middle">/i18n-scan</text>

  <rect x="50" y="280" width="160" height="70" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="130" y="308" class="label" text-anchor="middle">Audit</text>
  <text x="130" y="330" class="cmd cmd-audit" text-anchor="middle">/i18n-audit</text>

  <!-- Process -->
  <rect x="310" y="215" width="160" height="70" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="390" y="243" class="label" text-anchor="middle">Staging</text>
  <text x="390" y="265" class="cmd cmd-sync" text-anchor="middle">/i18n-sync</text>

  <rect x="560" y="215" width="160" height="70" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="640" y="243" class="label" text-anchor="middle">Apply</text>
  <text x="640" y="265" class="cmd cmd-apply" text-anchor="middle">/i18n-commit</text>

  <rect x="800" y="215" width="160" height="70" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="880" y="243" class="label" text-anchor="middle">Verify</text>
  <text x="880" y="265" class="cmd cmd-quality" text-anchor="middle">/i18n-audit-quality</text>

  <!-- Arrows & Human Verification -->
  <path d="M 210 185 L 260 185 Q 285 185 285 210 L 285 230 L 308 230" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <path d="M 210 315 L 260 315 Q 285 315 285 290 L 285 270 L 308 270" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <line x1="470" y1="250" x2="548" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="510" y="240" class="tag" text-anchor="middle">Human Review</text>
  
  <line x1="720" y1="250" x2="798" y2="250" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Feedback (Learning) -->
  <path d="M 880 285 L 880 360 Q 880 380 870 380 L 410 380 Q 390 380 390 360 L 390 288" fill="none" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="635" y="372" fill="#fb7185" font-size="10" text-anchor="middle">/i18n-learn (Learn from Manual Edits)</text>

  <!-- Legend -->
  <text x="50" y="50" class="legend-title">Mapping: Phase to Command</text>
  <rect x="50" y="65" width="12" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="70" y="72" class="sublabel">Scan</text>
  <rect x="120" y="65" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="72" class="sublabel">Audit</text>
</svg>
