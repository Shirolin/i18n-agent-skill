<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", ui-monospace, monospace; }
      .phase-num { fill: #475569; font-size: 10px; font-weight: 800; }
      .action { fill: #ffffff; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
      .cmd { fill: #94a3b8; font-size: 9px; }
      .agent-label { fill: #22d3ee; font-size: 8px; font-weight: 600; }
      .human-label { fill: #fb7185; font-size: 8px; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617" />
  
  <!-- Main Pipeline Path -->
  <line x1="100" y1="200" x2="900" y2="200" stroke="#1e293b" stroke-width="2" />

  <!-- STEP 1: IDENTIFY (Human-Led) -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#083344" stroke="#22d3ee" stroke-width="2" />
    <text x="80" y="25" class="phase-num" text-anchor="middle">步骤 01</text>
    <text x="80" y="50" class="action" text-anchor="middle">确定画像</text>
    <text x="80" y="75" class="cmd" text-anchor="middle">/i18n-init</text>
    <rect x="35" y="85" width="90" height="12" rx="4" fill="#fb7185" />
    <text x="80" y="94" fill="white" font-size="7" font-weight="800" text-anchor="middle">人机握手 (定调)</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="260" y1="200" x2="310" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- STEP 2: EXTRACT (AI-Led) -->
  <g transform="translate(320, 150)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#0f172a" stroke="#64748b" stroke-width="1.5" />
    <text x="80" y="25" class="phase-num" text-anchor="middle">步骤 02</text>
    <text x="80" y="50" class="action" text-anchor="middle">文案提取</text>
    <text x="80" y="75" class="cmd" text-anchor="middle">/i18n-scan</text>
    <text x="80" y="92" class="agent-label" text-anchor="middle">AI 自动化 (L1)</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="480" y1="200" x2="530" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- STEP 3: REFINE & COMMIT (AI+Human) -->
  <g transform="translate(540, 150)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#064e3b" stroke="#34d399" stroke-width="2" />
    <text x="80" y="25" class="phase-num" text-anchor="middle">步骤 03</text>
    <text x="80" y="50" class="action" text-anchor="middle">专家润色</text>
    <text x="80" y="75" class="cmd" text-anchor="middle">/i18n-optimize</text>
    <rect x="35" y="85" width="90" height="12" rx="4" fill="#fb7185" />
    <text x="80" y="94" fill="white" font-size="7" font-weight="800" text-anchor="middle">人工确认 (L2)</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="700" y1="200" x2="750" y2="200" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- STEP 4: PROJECT (AI-Led) -->
  <g transform="translate(760, 150)">
    <rect x="0" y="0" width="160" height="100" rx="10" fill="#2e1065" stroke="#a78bfa" stroke-width="1.5" />
    <text x="80" y="25" class="phase-num" text-anchor="middle">步骤 04</text>
    <text x="80" y="50" class="action" text-anchor="middle">全球同步</text>
    <text x="80" y="75" class="cmd" text-anchor="middle">/i18n-pivot-sync</text>
    <text x="80" y="92" class="agent-label" text-anchor="middle">多语言对齐</text>
  </g>

  <!-- Feedback Loop: LEARN (Passive) -->
  <path d="M 840 250 L 840 320 Q 840 340 820 340 L 400 340 Q 380 340 380 320 L 380 255" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow)" />
  <text x="610" y="332" fill="#fb7185" font-size="8" font-weight="600" text-anchor="middle">自主进化闭环 (/i18n-learn)</text>

  <!-- Bottom Legend -->
  <g transform="translate(100, 370)">
    <circle cx="10" cy="0" r="4" fill="#fb7185" /> <text x="20" y="4" fill="#94a3b8" font-size="8">人工决策</text>
    <circle cx="130" cy="0" r="4" fill="#22d3ee" /> <text x="140" y="4" fill="#94a3b8" font-size="8">AI 自动化</text>
  </g>
</svg>
